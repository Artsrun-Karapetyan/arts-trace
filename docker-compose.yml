services:
  postgres:
    image: postgres:16-alpine
    container_name: artstrace-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: artstrace
    ports:
      - "5432:5432"
    volumes:
      - artstrace_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d artstrace"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  artstrace_postgres_data:
